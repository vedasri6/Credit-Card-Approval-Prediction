{% extends "layout.html" %}

{% block title %}Page Not Found (404){% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="glass-panel p-5 mx-auto" style="max-width: 580px; border-radius: 24px;">
        <div class="analytics-card-icon icon-red mx-auto mb-4" style="width: 72px; height: 72px; font-size: 2.2rem;">
            <i class="bi bi-shield-slash"></i>
        </div>
        <h1 class="fw-bold display-4 mb-2">404 Error</h1>
        <h4 class="fw-bold mb-3 text-secondary">Decision Path Not Found</h4>
        <p class="text-muted mb-4">
            The requested evaluation resource or dashboard page does not exist or has been relocated within the network registry.
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-primary-custom">
            <i class="bi bi-house-door"></i> Return to Safety (Home)
        </a>
    </div>
</div>
{% endblock %}
